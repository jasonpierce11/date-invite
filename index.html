<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Invitation for Ena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-main: #2b2625;
            --text-muted: #706563;
            --accent: #ca764b;
            --accent-light: #f7ede6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: #ffffff;
            padding: 45px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(202, 118, 75, 0.04);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(247, 237, 230, 0.9);
        }

        .header-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 500;
            font-style: italic;
            line-height: 1.3;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .details {
            margin: 28px 0;
            padding: 20px 0;
            border-top: 1px solid var(--accent-light);
            border-bottom: 1px solid var(--accent-light);
        }

        .detail-item {
            margin: 14px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .detail-item strong {
            color: var(--text-main);
            font-weight: 600;
        }

        form { margin-top: 28px; text-align: left; }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #ebdcd5;
            border-radius: 10px;
            background-color: #faf8f5;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(202, 118, 75, 0.15);
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .radio-btn { position: relative; }
        .radio-btn input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .radio-label {
            display: block;
            text-align: center;
            padding: 14px;
            border: 1px solid #ebdcd5;
            border-radius: 10px;
            font-size: 0.9rem;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .radio-btn input[type="radio"]:checked + .radio-label {
            background-color: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--text-main);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button:hover { opacity: 0.95; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-tag">A Special Invitation</div>
        <h1>Ena, would you do me the honor of going out with me this Saturday?</h1>
        
        <div class="details">
            <div class="detail-item"><strong>Where:</strong> Roofers Union</div>
            <div class="detail-item"><strong>When:</strong> This Saturday at 7:00 PM</div>
        </div>

        <form id="rsvpForm" name="ena-rsvp" method="POST" data-netlify="true" action="/?success=true">
            <input type="hidden" name="form-name" value="ena-rsvp" />

            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" value="Ena" required>

            <label>Your Response</label>
            <div class="radio-group">
                <div class="radio-btn">
                    <input type="radio" id="yes" name="rsvp" value="yes" required>
                    <label for="yes" class="radio-label">Count me in ✨</label>
                </div>
                <div class="radio-btn">
                    <input type="radio" id="no" name="rsvp" value="no" required>
                    <label for="no" class="radio-label">Can't make it 🤍</label>
                </div>
            </div>

            <button type="submit">Send Response</button>
        </form>
    </div>

    <script>
        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            const myPhoneNumber = "+17069929644"; 
            const selectedRsvp = document.querySelector('input[name="rsvp"]:checked').value;
            let smsMessage = "";

            if (selectedRsvp === "yes") {
                smsMessage = "Of course, Jason. I feel like I’ve been waiting all my life for this honor";
            } else {
                smsMessage = "Sorry :/";
            }

            const smsUrl = `sms:${myPhoneNumber}?&body=${encodeURIComponent(smsMessage)}`;
            
            setTimeout(() => {
                window.location.href = smsUrl;
            }, 400);
        });

        if (window.location.search.includes('success=true')) {
            alert("Response sent! Can't wait. ✨");
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>

</body>
</html>
